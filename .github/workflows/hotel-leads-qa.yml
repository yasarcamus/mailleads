name: TouristNetTR Hotel Lead QA

on:
  workflow_dispatch:
  push:
    paths:
      - "triggers/hotel-leads-qa/**"

permissions:
  contents: write

jobs:
  qa-hotel-leads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run hotel lead QA splitter
        run: python scripts/qa_hotel_leads.py

      - name: Commit QA output
        run: |
          git config user.name "hotel-lead-qa-bot"
          git config user.email "hotel-lead-qa-bot@users.noreply.github.com"
          git add leads reports
          git commit -m "Add hotel lead QA output - $(date +%F)" || echo "No QA changes to commit"
          git push
